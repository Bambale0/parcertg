services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: parcertg
      POSTGRES_USER: parcertg
      POSTGRES_PASSWORD: parcertg
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parcertg -d parcertg"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
